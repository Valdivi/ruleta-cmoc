<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta CMOC - ODIN Mining</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: Arial, sans-serif;
            background: black;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            position: relative;
        }

        /* BOTÓN DE MODO PRESENTACIÓN */
        .presentation-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 200;
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            transition: all 0.3s;
            opacity: 1;
            pointer-events: auto;
        }

        .presentation-btn:hover {
            background: rgba(0, 0, 0, 0.9);
            transform: scale(1.1);
        }

        .presentation-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* SCREENSAVER CON VIDEOS */
        .screensaver {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s;
        }

        .screensaver.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .screensaver video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* BOTÓN DE SONIDO - GRIS SIN FONDO */
        .sound-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 150;
            width: 40px;
            height: 40px;
            background: transparent;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #999;
            transition: all 0.3s;
            pointer-events: auto;
        }

        .sound-btn:hover {
            color: #666;
            transform: scale(1.15);
        }

        .sound-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .sound-btn.muted {
            color: #888;
        }

        .sound-btn.unmuted {
            color: #4B0082;
        }

        /* CONTENEDOR DE LA RULETA */
        .game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .game-container.active {
            opacity: 1;
            pointer-events: auto;
        }

        .game-container::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('./fondo.jpg') center/cover no-repeat;
            background-attachment: fixed;
            opacity: 0.6;
            z-index: -1;
        }

        .container {
            max-width: 100%;
            width: 100%;
            height: 100vh;
            background: transparent;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .logo-section {
            text-align: center;
            width: 100%;
        }

        .logo-section img {
            max-width: 280px;
            width: 100%;
            height: auto;
        }

        .wheel-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 100%;
            flex: 1;
            justify-content: center;
        }

        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wheel {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .wheel img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 75px;
            z-index: 20;
            pointer-events: none;
        }

        .pointer img {
            width: 100%;
            height: 100%;
        }

        .button-container {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .button-spin {
            width: 130px;
            height: 130px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .button-spin img {
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .button-spin:hover:not(:disabled) img {
            transform: scale(1.1);
            filter: brightness(1.1);
        }

        .button-spin:active:not(:disabled) img {
            transform: scale(0.95);
        }

        .button-spin:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* MODO PRESENTACIÓN - FULLSCREEN */
        body.fullscreen {
            width: 100vw;
            height: 100vh;
        }

        body.fullscreen .presentation-btn {
            display: none;
        }

        /* PARA DESKTOP */
        @media (min-width: 769px) {
            .logo-section img {
                max-width: 380px;
            }

            .wheel-container {
                width: 380px;
                height: 380px;
            }

            .button-spin {
                width: 160px;
                height: 160px;
            }
        }

/* PARA MOBILE */
@media (max-width: 768px) {
    .container {
        padding: 10px;
        gap: 10px;
        justify-content: center;
        padding-top: 20px;
        overflow: hidden;
    }

    .logo-section {
        flex-shrink: 0;
    }

    .logo-section img {
    max-width: 290px;
    margin-bottom: 15px;
}

    .wheel-container {
        width: 330px;
        height: 330px;
        margin-top: 0;
    }

    .button-spin {
        width: 156px;
        height: 156px;
    }

    .wheel-wrapper {
        gap: 10px;
        flex: 0;
    }

    .pointer {
        width: 60px;
        height: 74px;
    }
}
    </style>
</head>
<body>
    <!-- BOTÓN DE MODO PRESENTACIÓN -->
    <button class="presentation-btn" id="presentationBtn" title="Modo Presentación">
        ⛶
    </button>

    <!-- BOTÓN DE SONIDO -->
    <button class="sound-btn muted" id="soundBtn" title="Activar Sonido">
        🔊
    </button>

    <!-- SCREENSAVER CON VIDEOS -->
    <div class="screensaver" id="screensaver">
        <video id="videoPlayer" autoplay muted playsinline>
            <source src="" type="video/mp4">
        </video>
    </div>

    <!-- JUEGO DE LA RULETA -->
    <div class="game-container" id="gameContainer">
        <div class="container">
            <div class="logo-section">
                <img src="prueba_de_color_odin_CMOC-13.png" alt="CMOC ODIN">
            </div>

            <div class="wheel-wrapper">
                <div class="wheel-container">
                    <div class="wheel" id="wheel">
                        <img src="ruleta.png" alt="Ruleta">
                    </div>

                    <div class="pointer">
                        <img src="puntero.png" alt="Puntero">
                    </div>
                </div>

                <div class="button-container">
                    <button class="button-spin" id="spinBtn" title="Haz clic para girar la ruleta">
                        <img src="boton_de_juego.png" alt="GIRAR">
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // LISTA DE VIDEOS
        const videos = [
    'https://ruleta-cmoc.b-cdn.net/IMG_1074.mp4',
    'https://ruleta-cmoc.b-cdn.net/IMG_2990.mp4',
    'https://ruleta-cmoc.b-cdn.net/QNPN7851.mp4',
    'https://ruleta-cmoc.b-cdn.net/XLWX2369.mp4'
];

        // Cargar el índice guardado del localStorage
        let currentVideoIndex = parseInt(localStorage.getItem('videoIndex') || '0');
        let isGameActive = false;
        let inactivityTimeout;
        let isSoundEnabled = false;
        const INACTIVITY_TIME = 3 * 60 * 1000; // 3 minutos en milisegundos

        const screensaver = document.getElementById('screensaver');
        const gameContainer = document.getElementById('gameContainer');
        const videoPlayer = document.getElementById('videoPlayer');
        const spinBtn = document.getElementById('spinBtn');
        const presentationBtn = document.getElementById('presentationBtn');
        const soundBtn = document.getElementById('soundBtn');

        // MODO PRESENTACIÓN - FULLSCREEN
        presentationBtn.addEventListener('click', togglePresentation);

        function togglePresentation() {
            const elem = document.documentElement;
            
            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen();
                } else if (elem.mozRequestFullScreen) {
                    elem.mozRequestFullScreen();
                } else if (elem.msRequestFullscreen) {
                    elem.msRequestFullscreen();
                }
                document.body.classList.add('fullscreen');
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
                document.body.classList.remove('fullscreen');
            }
        }

        // Salir del fullscreen con ESC
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.body.classList.remove('fullscreen');
            }
        });

        // CONTROL DE SONIDO
        soundBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // No activar el juego al hacer clic aquí
            
            isSoundEnabled = !isSoundEnabled;
            videoPlayer.muted = !isSoundEnabled;
            
            if (isSoundEnabled) {
                soundBtn.classList.remove('muted');
                soundBtn.classList.add('unmuted');
                soundBtn.textContent = '🔉';
            } else {
                soundBtn.classList.remove('unmuted');
                soundBtn.classList.add('muted');
                soundBtn.textContent = '🔊';
            }
        });

        // Guardar índice cada vez que cambia
        function saveVideoIndex() {
            currentVideoIndex = (currentVideoIndex + 1) % videos.length;
            localStorage.setItem('videoIndex', currentVideoIndex);
        }

        // Reproducir videos en loop
        function playVideos() {
            videoPlayer.src = videos[currentVideoIndex];
            videoPlayer.muted = !isSoundEnabled; // Aplicar estado del sonido
            videoPlayer.play();
        }

        // Al terminar un video, pasar al siguiente
        videoPlayer.addEventListener('ended', () => {
            saveVideoIndex();
            playVideos();
        });

        // Mostrar ruleta al hacer clic
        document.addEventListener('click', showGame);

        function showGame() {
    if (isGameActive) return;

    isGameActive = true;
    screensaver.classList.add('hidden');
    gameContainer.classList.add('active');
    soundBtn.classList.add('hidden');

    // Silenciar video al entrar a la ruleta
    videoPlayer.muted = true;
    videoPlayer.pause();
    isSoundEnabled = false;
    soundBtn.classList.remove('unmuted');
    soundBtn.classList.add('muted');
    soundBtn.textContent = '🔊';

    resetInactivityTimer();
    document.removeEventListener('click', showGame);
}

        function resetInactivityTimer() {
            clearTimeout(inactivityTimeout);
            
            inactivityTimeout = setTimeout(() => {
                hideGame();
            }, INACTIVITY_TIME);
        }

        function hideGame() {
    isGameActive = false;
    gameContainer.classList.remove('active');
    screensaver.classList.remove('hidden');
    soundBtn.classList.remove('hidden');

    // Reactivar sonido al volver al screensaver
    isSoundEnabled = true;
    soundBtn.classList.remove('muted');
    soundBtn.classList.add('unmuted');
    soundBtn.textContent = '🔉';

    saveVideoIndex();
    playVideos();

    // Intentar reproducir con sonido
    videoPlayer.muted = false;
    videoPlayer.play().catch(() => {
        // Si el navegador bloquea, reproducir sin sonido
        videoPlayer.muted = true;
        videoPlayer.play();
    });

    document.addEventListener('click', showGame);
}

        // Detectar actividad mientras la ruleta está activa
        spinBtn.addEventListener('click', () => {
            if (isGameActive) {
                resetInactivityTimer();
            }
        });

        // Iniciar con los videos
        playVideos();

        // LÓGICA DE LA RULETA
        const premios = [
            'RESPONDE UNA PREGUNTA Y GANA',
            'PREMIO ESPECIAL',
            'SIGUE PARTICIPANDO',
            'RESPONDE UNA PREGUNTA',
            'PRESENTA UN DESAFÍO APRENDE',
            'RESPONDE UNA PREGUNTA APRENDE',
            'PRESENTACIÓN ESPECIAL APRENDE',
            'SIGUE PARTICIPANDO'
        ];

        let isSpinning = false;
        let currentRotation = 0;

        const wheel = document.getElementById('wheel');
        const wheelImg = wheel.querySelector('img');

        spinBtn.addEventListener('click', spinWheel);

        function spinWheel() {
            if (isSpinning || !isGameActive) return;

            isSpinning = true;
            spinBtn.disabled = true;
            resetInactivityTimer();

            const randomSpin = Math.floor(Math.random() * 2880) + 1080;
            const totalRotation = currentRotation + randomSpin;

            wheelImg.style.transform = `rotate(${totalRotation}deg)`;

            currentRotation = totalRotation;

            setTimeout(() => {
                isSpinning = false;
                spinBtn.disabled = false;
                resetInactivityTimer();
            }, 4000);
        }
    </script>
</body>
</html>
